# =========================================================
# Training Configuration — Banking77 PEFT Pipeline
# =========================================================

# --- Reproducibility ---
seed: 42

# --- Model ---
model:
  name: "unsloth/Llama-3.2-1B-Instruct"
  max_seq_length: 512
  dtype: null                    # Auto-detect (float16 on T4, bfloat16 on A100+)
  load_in_4bit: true             # QLoRA: 4-bit NF4 quantization

# --- PEFT / LoRA ---
peft:
  r: 32                         # LoRA rank — higher = more capacity
  lora_alpha: 32                # Scaling factor; alpha/r = effective lr multiplier
  lora_dropout: 0.05              
  use_dora: true                # DoRA: weight-decomposed low-rank adaptation
  use_rslora: true              # rsLoRA: rank-stabilized scaling (alpha/sqrt(r))
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  use_gradient_checkpointing: "unsloth"  # Unsloth's memory-efficient gradient checkpointing

# --- SFTTrainer ---
training:
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: true
  bf16: false
  optim: "adamw_8bit"            # 8-bit AdamW for memory efficiency
  neftune_noise_alpha: 5        # Add NEFTune noise to embeddings for better generalization
  logging_steps: 50
  save_strategy: "steps"
  save_steps: 50
  eval_strategy: "steps"
  eval_steps: 50
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  report_to: "wandb"
  dataloader_num_workers: 2
  dataloader_pin_memory: true

# --- Early Stopping ---
early_stopping:
  patience: 3                  # Stop after 3 evals if validation loss doesn't improve
  threshold: 0.01              # Minimum improvement threshold

# --- Weights & Biases ---
wandb:
  project: "banking77-finetuning"
  run_name: "llama3.2-1b-dora"  # Timestamp will be added at runtime
  tags:
    - "banking77"
    - "llama-3.2-1b"
    - "qlora"
    - "dora"
    - "rslora"

# --- Data Preparation ---
data:
  val_split_ratio: 0.1        # 10% of train → validation

# --- Paths ---
paths:
  raw_data_dir: "data/raw/"
  split_data_dir: "data/processed/split"
  processed_data_dir: "data/processed/template"
  plot_dir: "outputs/plots"
  checkpoint_dir: "models/checkpoints"
  finetuned_model_dir: "models/finetuned"
  output_dir: "outputs"
